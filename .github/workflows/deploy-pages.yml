name: Deploy Solar Voyager to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Keep this workflow independent from GitHub's automatic branch-based
# Pages workflow, which may still be enabled in the repository settings.
concurrency:
  group: solar-voyager-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prefer GitHub Actions as the Pages source
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl --silent --show-error \
            --output /tmp/pages-response.json \
            --write-out "%{http_code}" \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            --data '{"build_type":"workflow"}')

          if [ "$status" != "204" ]; then
            echo "Could not change the Pages source automatically (HTTP $status)."
            cat /tmp/pages-response.json
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production game
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # If branch publishing is still active, its automatic workflow can race
      # this one and replace dist/ with the raw repository. Waiting makes the
      # compiled Vite artifact the final deployment.
      - name: Wait for any legacy Pages deployment
        if: github.event_name == 'push'
        run: sleep 75

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
